# Living Room TV — Universal Media Player
# Unifies the LG webOS TV's integrations into one entity: webOS native (primary
# control), Google Cast, Plex. Power-on is routed through a Wake-on-LAN helper
# script (see turn-on-living-room-tv.yaml.txt) because the webOS entity doesn't
# advertise turn_on unless a MAC is registered with the integration.
#
# Add under the `media_player:` key in configuration.yaml.
# Adjust the child entity_ids to match your own (Developer Tools -> States).
# NOTE: on this setup the Cast child got the base entity_id and the webOS native
# control got the _3 suffix — verify yours, the suffixes are install-specific.

media_player:
  - platform: universal
    name: "Living Room TV"
    unique_id: living_room_tv_universal
    children:
      - media_player.lg_webos_tv_oled77c4aua_3    # webOS native — primary control
      - media_player.lg_webos_tv_oled77c4aua      # Google Cast
      - media_player.livingroom_plex              # Plex
    active_child_template: >-
      {% if is_state('media_player.livingroom_plex', 'playing') %}
        media_player.livingroom_plex
      {% elif is_state('media_player.lg_webos_tv_oled77c4aua', 'playing') %}
        media_player.lg_webos_tv_oled77c4aua
      {% else %}
        media_player.lg_webos_tv_oled77c4aua_3
      {% endif %}
    attributes:
      media_title: media_player.lg_webos_tv_oled77c4aua|media_title
      media_artist: media_player.lg_webos_tv_oled77c4aua|media_artist
      media_album_name: media_player.lg_webos_tv_oled77c4aua|media_album_name
      media_content_type: media_player.lg_webos_tv_oled77c4aua|media_content_type
      media_duration: media_player.lg_webos_tv_oled77c4aua|media_duration
      media_position: media_player.lg_webos_tv_oled77c4aua|media_position
      entity_picture: media_player.lg_webos_tv_oled77c4aua|entity_picture
      source: media_player.lg_webos_tv_oled77c4aua_3|source
      source_list: media_player.lg_webos_tv_oled77c4aua_3|source_list
    commands:
      turn_on:
        service: script.turn_on_living_room_tv     # Wake-on-LAN helper
      turn_off:
        service: media_player.turn_off
        data:
          entity_id: media_player.lg_webos_tv_oled77c4aua_3
      select_source:
        service: media_player.select_source
        data:
          entity_id: media_player.lg_webos_tv_oled77c4aua_3
          source: "{{ source }}"
      volume_up:
        service: media_player.volume_up
        data:
          entity_id: media_player.lg_webos_tv_oled77c4aua_3
      volume_down:
        service: media_player.volume_down
        data:
          entity_id: media_player.lg_webos_tv_oled77c4aua_3
      volume_mute:
        service: media_player.volume_mute
        data:
          entity_id: media_player.lg_webos_tv_oled77c4aua_3
          is_volume_muted: "{{ is_volume_muted }}"
      volume_set:
        service: media_player.volume_set
        data:
          entity_id: media_player.lg_webos_tv_oled77c4aua_3
          volume_level: "{{ volume_level }}"
