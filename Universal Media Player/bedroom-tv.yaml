# Bedroom TV — Universal Media Player
# Unifies multiple integrations for one physical TV (Hisense Google TV) into a
# single controllable entity: Android Debug Bridge (control/apps), Android TV
# Remote (power-on from sleep), Google Cast (casting + Music Assistant), Plex.
#
# Add under the `media_player:` key in configuration.yaml.
# Adjust the child entity_ids to match your own (Developer Tools -> States).

media_player:
  - platform: universal
    name: "Bedroom TV"
    unique_id: bedroom_tv_universal
    children:
      - media_player.bedroom_tv_adb       # Android Debug Bridge — control, apps, navigation
      - media_player.bedroom_tv           # Android TV Remote — power-on (works from sleep)
      - media_player.bedroom_tv_cast      # Google Cast — casting + Music Assistant playback
      - media_player.bedroom_plex         # Plex
    active_child_template: >-
      {% if is_state('media_player.bedroom_plex', 'playing') %}
        media_player.bedroom_plex
      {% elif is_state('media_player.bedroom_tv_cast', 'playing') %}
        media_player.bedroom_tv_cast
      {% elif is_state('media_player.bedroom_tv_adb', 'playing') %}
        media_player.bedroom_tv_adb
      {% else %}
        media_player.bedroom_tv
      {% endif %}
    attributes:
      media_title: media_player.bedroom_tv_cast|media_title
      media_artist: media_player.bedroom_tv_cast|media_artist
      media_album_name: media_player.bedroom_tv_cast|media_album_name
      media_content_type: media_player.bedroom_tv_cast|media_content_type
      media_duration: media_player.bedroom_tv_cast|media_duration
      media_position: media_player.bedroom_tv_cast|media_position
      entity_picture: media_player.bedroom_tv_cast|entity_picture
      app_name: media_player.bedroom_tv_adb|app_name
      source: media_player.bedroom_tv_adb|source
      source_list: media_player.bedroom_tv_adb|source_list
    commands:
      turn_on:
        service: media_player.turn_on
        data:
          entity_id: media_player.bedroom_tv        # Android TV Remote — wakes from sleep
      turn_off:
        service: media_player.turn_off
        data:
          entity_id: media_player.bedroom_tv_adb
      select_source:
        service: media_player.select_source
        data:
          entity_id: media_player.bedroom_tv_adb
          source: "{{ source }}"
      volume_up:
        service: media_player.volume_up
        data:
          entity_id: media_player.bedroom_tv_adb
      volume_down:
        service: media_player.volume_down
        data:
          entity_id: media_player.bedroom_tv_adb
      volume_mute:
        service: media_player.volume_mute
        data:
          entity_id: media_player.bedroom_tv_adb
          is_volume_muted: "{{ is_volume_muted }}"
      volume_set:
        service: media_player.volume_set
        data:
          entity_id: media_player.bedroom_tv_adb
          volume_level: "{{ volume_level }}"
