# Dog Medication reminders — helpers + notify group.
# Add the input_boolean block under your `input_boolean:` key (add the key if you
# don't have one), and the notify group under your `notify:` key, in
# configuration.yaml. One input_boolean per dose = "given today", reset daily by
# the reset automation.
#
# This example uses a 4-dose schedule where each dose is a different combination
# of medications — name your helpers/doses however fits your routine.

input_boolean:
  dog_meds_6am:
    name: "Dog Meds — 6 AM (Meds A, B, C)"
    icon: mdi:pill
  dog_meds_2pm:
    name: "Dog Meds — 2 PM (Meds A, C)"
    icon: mdi:pill
  dog_meds_6pm:
    name: "Dog Meds — 6 PM (Med B)"
    icon: mdi:pill
  dog_meds_10pm:
    name: "Dog Meds — 10 PM (Meds A, C)"
    icon: mdi:pill

# Reminders fan out to everyone in this group. HA already syncs the GIVEN state
# (the input_booleans) across all Companion apps in real time — the group only
# fans out the push notification to multiple people.
notify:
  - platform: group
    name: dog_caretakers
    services:
      - service: mobile_app_phone            # replace with your phone's notify service
      # - service: mobile_app_partner_phone  # add a second caretaker here
