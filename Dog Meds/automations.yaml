# Dog Medication reminders — automations.
# Add these to automations.yaml. This example uses a 4-dose schedule where each
# dose names its specific medications in the reminder, so whoever is dosing sees
# exactly which pills to give. Adjust dose times (keep them on :00/:15/:30/:45
# boundaries so the first reminder lands on time), medication names, and the
# missed-dose times (= dose time + nag_minutes... here +60).

# Reset all doses to "not given" at the start of each day.
- id: dog_meds_reset
  alias: "Dog Meds — Daily reset"
  trigger:
    - platform: time
      at: "00:01:00"
  action:
    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.dog_meds_6am
          - input_boolean.dog_meds_2pm
          - input_boolean.dog_meds_6pm
          - input_boolean.dog_meds_10pm
  mode: single

# Every 15 min: for each dose, if it's past dose-time, within the nag window, and
# not yet given -> send an actionable reminder naming the meds for that dose.
# Restart-proof (re-evaluates each tick; no long-running loop).
- id: dog_meds_reminder
  alias: "Dog Meds — Reminder & nag"
  trigger:
    - platform: time_pattern
      minutes: "/15"
  variables:
    nag_minutes: 45        # nag for the first 45 min; missed-alert takes over at +60
    doses:
      - { bool: input_boolean.dog_meds_6am,  time: "06:00", key: "6am",  label: "6 AM",  meds: "Medication A, Medication B, and Medication C" }
      - { bool: input_boolean.dog_meds_2pm,  time: "14:00", key: "2pm",  label: "2 PM",  meds: "Medication A and Medication C" }
      - { bool: input_boolean.dog_meds_6pm,  time: "18:00", key: "6pm",  label: "6 PM",  meds: "Medication B" }
      - { bool: input_boolean.dog_meds_10pm, time: "22:00", key: "10pm", label: "10 PM", meds: "Medication A and Medication C" }
  action:
    - repeat:
        for_each: "{{ doses }}"
        sequence:
          - variables:
              mins_since: "{{ (now() - today_at(repeat.item.time)).total_seconds() / 60 }}"
          - if:
              - condition: template
                value_template: >-
                  {{ is_state(repeat.item.bool, 'off')
                     and mins_since >= 0
                     and mins_since <= nag_minutes }}
            then:
              - action: notify.dog_caretakers
                data:
                  title: "🐶 Dog Medication — {{ repeat.item.label }}"
                  message: "Give {{ repeat.item.meds }}. Has it been given?"
                  data:
                    tag: "dog_meds_{{ repeat.item.key }}"
                    actions:
                      - action: "DOG_MEDS_GIVEN_{{ repeat.item.key }}"
                        title: "✅ Mark given"
  mode: single

# When someone taps "Mark given", flip that dose on and clear the notification
# on every device.
- id: dog_meds_mark_given
  alias: "Dog Meds — Mark given from notification"
  trigger:
    - platform: event
      event_type: mobile_app_notification_action
  condition:
    - condition: template
      value_template: "{{ trigger.event.data.action.startswith('DOG_MEDS_GIVEN_') }}"
  variables:
    key: "{{ trigger.event.data.action.split('_')[-1] }}"
    bool_map:
      "6am": input_boolean.dog_meds_6am
      "2pm": input_boolean.dog_meds_2pm
      "6pm": input_boolean.dog_meds_6pm
      "10pm": input_boolean.dog_meds_10pm
  action:
    - action: input_boolean.turn_on
      target:
        entity_id: "{{ bool_map[key] }}"
    - action: notify.dog_caretakers
      data:
        message: "clear_notification"
        data:
          tag: "dog_meds_{{ key }}"
  mode: parallel

# Missed-dose escalation: at each dose's window-end (dose time + nag window), if
# still not given, send a time-sensitive push to everyone + a spoken backstop
# that names the missed meds.
- id: dog_meds_missed
  alias: "Dog Meds — Missed dose alert"
  trigger:
    - platform: time
      at: "07:00:00"
      id: "6am"
    - platform: time
      at: "15:00:00"
      id: "2pm"
    - platform: time
      at: "19:00:00"
      id: "6pm"
    - platform: time
      at: "23:00:00"
      id: "10pm"
  variables:
    bool_map:
      "6am": input_boolean.dog_meds_6am
      "2pm": input_boolean.dog_meds_2pm
      "6pm": input_boolean.dog_meds_6pm
      "10pm": input_boolean.dog_meds_10pm
    meds_map:
      "6am": "Medication A, Medication B, and Medication C"
      "2pm": "Medication A and Medication C"
      "6pm": "Medication B"
      "10pm": "Medication A and Medication C"
    dose_bool: "{{ bool_map[trigger.id] }}"
    dose_meds: "{{ meds_map[trigger.id] }}"
  condition:
    - condition: template
      value_template: "{{ is_state(dose_bool, 'off') }}"
  action:
    - action: notify.dog_caretakers
      data:
        title: "⚠️ MISSED Dog Medication — {{ trigger.id }}"
        message: "The {{ trigger.id }} dose ({{ dose_meds }}) was NOT marked given. Please check on it."
        data:
          tag: "dog_meds_missed_{{ trigger.id }}"
          priority: high
          ttl: 0
          push:
            interruption-level: time-sensitive
          actions:
            - action: "DOG_MEDS_GIVEN_{{ trigger.id }}"
              title: "✅ Mark given"
    # Optional spoken backstop — adjust the media_player / remove if unwanted.
    - action: tts.speak
      target:
        entity_id: tts.home_assistant_cloud
      data:
        media_player_entity_id: media_player.home_assistant_voice
        message: "Attention. The {{ trigger.id }} dog medication dose, {{ dose_meds }}, has not been given."
  mode: single
