# CrowPanel 7" HMI (ESP32-S3, 800x480 RGB EK9716, GT911 touch) - whole-home
# Home Assistant dashboard via ESPHome + LVGL.
#
# Display block/pins/timing are Elecrow's official 7" HMI config (verified).
# GT911 touch has every known CrowPanel gotcha handled (see inline notes).
#
# ENTITY IDs TO EDIT (search "<- "): light.living_room, light.bedroom,
# sensor.indoor_temperature, sensor.indoor_humidity. Dog TV and All-Lights-Off
# work as-is. Put this file + usb_disable.h in the ESPHome config dir together.
# FIRST FLASH MUST BE OVER USB-C; OTA works after that.

substitutions:
  name: crowpanel7
  friendly_name: "Home"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  includes:
    - usb_disable.h   # frees GPIO19/20 (USB-serial-JTAG) for the touch I2C
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    # If the display is blank/torn, pin a known-good IDF:
    #   version: 5.3.0
    #   platform_version: 6.8.1
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

logger:

api:
  encryption:
    key: !secret crowpanel_api_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "CrowPanel7 Fallback"

captive_portal:

time:
  - platform: homeassistant
    id: ha_time

# --- Backlight (Elecrow official: LEDC on GPIO2) ---
output:
  - platform: ledc
    pin: 2
    frequency: 1220
    id: gpio_backlight_pwm
light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    id: back_light
    restore_mode: ALWAYS_ON

# --- Touch I2C. scan:false is REQUIRED or the GT911 fails. ---
i2c:
  - id: touch_i2c
    sda: 19
    scl: 20
    scan: false
touchscreen:
  - platform: gt911
    id: my_touch
    i2c_id: touch_i2c
    # No interrupt_pin / reset_pin / calibration (all break CrowPanel touch).
    # If touch is dead, your GT911 is at 0x14: add "address: 0x14".

# --- Display: Elecrow official 7" HMI RGB pins + timing (verified) ---
display:
  - platform: rpi_dpi_rgb
    id: main_display
    update_interval: never
    auto_clear_enabled: false
    color_order: RGB
    invert_colors: true
    dimensions:
      width: 800
      height: 480
    de_pin: 41
    hsync_pin: 39
    vsync_pin: 40
    pclk_pin: 0
    pclk_frequency: 20MHz
    hsync_pulse_width: 48
    hsync_front_porch: 40
    hsync_back_porch: 40
    vsync_pulse_width: 31
    vsync_front_porch: 1
    vsync_back_porch: 13
    data_pins:
      red: [14, 21, 47, 48, 45]
      green: [9, 46, 3, 8, 16, 1]
      blue: [15, 7, 6, 5, 4]

font:
  - file: "gfonts://Roboto"
    id: font_lg
    size: 64
  - file: "gfonts://Roboto"
    id: font_val
    size: 44
  - file: "gfonts://Roboto"
    id: font_md
    size: 26
  - file: "gfonts://Roboto"
    id: font_sm
    size: 18

# --- Live values pulled from Home Assistant ---
sensor:
  - platform: homeassistant
    id: s_temp
    entity_id: sensor.indoor_temperature   # <- your indoor temp sensor
    on_value:
      - lvgl.label.update:
          id: lbl_temp
          text: !lambda |-
            char b[8]; snprintf(b, sizeof(b), "%.0f", x); return std::string(b);
  - platform: homeassistant
    id: s_humid
    entity_id: sensor.indoor_humidity       # <- your indoor humidity sensor
    on_value:
      - lvgl.label.update:
          id: lbl_humid
          text: !lambda |-
            char b[8]; snprintf(b, sizeof(b), "%.0f%%", x); return std::string(b);

binary_sensor:
  - platform: homeassistant
    id: st_lr
    entity_id: light.living_room            # <- same as the Living Room tile
    on_state:
      - lvgl.label.update:
          id: lbl_lr
          text: !lambda 'return x ? "On" : "Off";'
  - platform: homeassistant
    id: st_br
    entity_id: light.bedroom                # <- same as the Bedroom tile
    on_state:
      - lvgl.label.update:
          id: lbl_br
          text: !lambda 'return x ? "On" : "Off";'

# Keep the clock + date live.
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda 'return id(ha_time).now().is_valid() ? id(ha_time).now().strftime("%H:%M") : std::string("--:--");'
      - lvgl.label.update:
          id: lbl_date
          text: !lambda 'return id(ha_time).now().is_valid() ? id(ha_time).now().strftime("%a %b %d") : std::string("");'

# --- Whole-home dashboard ---
lvgl:
  displays:
    - main_display
  touchscreens:
    - my_touch
  pages:
    - id: home
      bg_color: 0x0d1117
      widgets:
        # Header
        - label:
            id: lbl_clock
            align: TOP_LEFT
            x: 18
            y: 10
            text_font: font_lg
            text_color: 0xFFFFFF
            text: "--:--"
        - label:
            id: lbl_date
            align: TOP_RIGHT
            x: -18
            y: 34
            text_font: font_md
            text_color: 0x9AA5B1
            text: ""

        # Row 1: Living Room / Bedroom / All Off
        - button:
            x: 16
            y: 96
            width: 244
            height: 180
            bg_color: 0x1b2229
            bg_opa: COVER
            radius: 14
            border_width: 0
            widgets:
              - label:
                  align: TOP_LEFT
                  x: 14
                  y: 12
                  text_font: font_sm
                  text_color: 0x9AA5B1
                  text: "Living Room"
              - label:
                  id: lbl_lr
                  align: BOTTOM_LEFT
                  x: 14
                  y: -14
                  text_font: font_val
                  text_color: 0xFFFFFF
                  text: "--"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.living_room   # <- your living room light/group
        - button:
            x: 278
            y: 96
            width: 244
            height: 180
            bg_color: 0x1b2229
            bg_opa: COVER
            radius: 14
            border_width: 0
            widgets:
              - label:
                  align: TOP_LEFT
                  x: 14
                  y: 12
                  text_font: font_sm
                  text_color: 0x9AA5B1
                  text: "Bedroom"
              - label:
                  id: lbl_br
                  align: BOTTOM_LEFT
                  x: 14
                  y: -14
                  text_font: font_val
                  text_color: 0xFFFFFF
                  text: "--"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.bedroom       # <- your bedroom light/group
        - button:
            x: 540
            y: 96
            width: 244
            height: 180
            bg_color: 0x3a2230
            bg_opa: COVER
            radius: 14
            border_width: 0
            widgets:
              - label:
                  align: CENTER
                  text_font: font_md
                  text_color: 0xFFFFFF
                  text: "All Lights\nOff"
            on_click:
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: all

        # Row 2: Indoor Temp / Humidity / Dog TV
        - obj:
            x: 16
            y: 292
            width: 244
            height: 180
            bg_color: 0x1b2229
            bg_opa: COVER
            radius: 14
            border_width: 0
            scrollbar_mode: "OFF"
            widgets:
              - label:
                  align: TOP_LEFT
                  x: 14
                  y: 12
                  text_font: font_sm
                  text_color: 0x9AA5B1
                  text: "Indoor Temp"
              - label:
                  id: lbl_temp
                  align: CENTER
                  text_font: font_lg
                  text_color: 0xFFFFFF
                  text: "--"
        - obj:
            x: 278
            y: 292
            width: 244
            height: 180
            bg_color: 0x1b2229
            bg_opa: COVER
            radius: 14
            border_width: 0
            scrollbar_mode: "OFF"
            widgets:
              - label:
                  align: TOP_LEFT
                  x: 14
                  y: 12
                  text_font: font_sm
                  text_color: 0x9AA5B1
                  text: "Humidity"
              - label:
                  id: lbl_humid
                  align: CENTER
                  text_font: font_lg
                  text_color: 0xFFFFFF
                  text: "--"
        - button:
            x: 540
            y: 292
            width: 244
            height: 180
            bg_color: 0x22364f
            bg_opa: COVER
            radius: 14
            border_width: 0
            widgets:
              - label:
                  align: CENTER
                  text_font: font_md
                  text_color: 0xFFFFFF
                  text: "Dog TV"
            on_click:
              - homeassistant.service:
                  service: script.dog_tv_living_room
