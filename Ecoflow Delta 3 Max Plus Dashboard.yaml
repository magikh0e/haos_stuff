views:
  - type: sections
    title: Delta 3 Max Plus
    path: ecoflow
    icon: mdi:battery-charging-high
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Battery
          - type: gauge
            entity: sensor.delta_3_max_plus_1753_main_battery_level
            name: Battery
            min: 0
            max: 100
            needle: true
            severity:
              green: 50
              yellow: 20
              red: 0
          - type: tile
            entity: sensor.delta_3_max_plus_1753_battery_charging_state
            name: State
          - type: tile
            entity: sensor.delta_3_max_plus_1753_discharge_remaining_time
            name: Time to empty
          - type: tile
            entity: sensor.delta_3_max_plus_1753_charge_remaining_time
            name: Time to full
      - type: grid
        cards:
          - type: heading
            heading: Controls
          - type: tile
            entity: switch.delta_3_max_plus_1753_ac_output
            name: AC Output
          - type: tile
            entity: switch.delta_3_max_plus_1753_ac2_output
            name: AC2 Output
          - type: tile
            entity: switch.delta_3_max_plus_1753_dc_output
            name: DC Output
          - type: tile
            entity: switch.delta_3_max_plus_1753_x_boost_enabled
            name: X-Boost
          - type: tile
            entity: switch.delta_3_max_plus_1753_beeper
            name: Beeper
          - type: tile
            entity: switch.delta_3_max_plus_1753_backup_reserve_enabled
            name: Backup Reserve
          - type: tile
            entity: switch.delta_3_max_plus_1753_bypass_output_disabled
            name: Bypass Disabled
      - type: grid
        cards:
          - type: heading
            heading: Settings
          - type: entities
            show_header_toggle: false
            entities:
              - entity: number.delta_3_max_plus_1753_max_charge_level
                name: Max Charge Level
              - entity: number.delta_3_max_plus_1753_min_discharge_level
                name: Min Discharge Level
              - entity: number.delta_3_max_plus_1753_backup_reserve_level
                name: Backup Reserve Level
      - type: grid
        cards:
          - type: heading
            heading: Power Flow
          - type: tile
            entity: sensor.delta_3_max_plus_1753_total_in_power
            name: Total In
          - type: tile
            entity: sensor.delta_3_max_plus_1753_total_out_power
            name: Total Out
          - type: tile
            entity: sensor.delta_3_max_plus_1753_ac_in_power
            name: AC In
          - type: tile
            entity: sensor.delta_3_max_plus_1753_solar_in_power
            name: Solar 1
          - type: tile
            entity: sensor.delta_3_max_plus_1753_solar_2_in_power
            name: Solar 2
          - type: tile
            entity: sensor.delta_3_max_plus_1753_dc_out_power
            name: DC 12V
      - type: grid
        cards:
          - type: heading
            heading: USB Outputs
          - type: tile
            entity: sensor.delta_3_max_plus_1753_type_c_1_out_power
            name: USB-C 1
          - type: tile
            entity: sensor.delta_3_max_plus_1753_type_c_2_out_power
            name: USB-C 2
          - type: tile
            entity: sensor.delta_3_max_plus_1753_type_c_3_out_power
            name: USB-C 3
          - type: tile
            entity: sensor.delta_3_max_plus_1753_usb_qc_1_out_power
            name: USB-A 1
          - type: tile
            entity: sensor.delta_3_max_plus_1753_usb_qc_2_out_power
            name: USB-A 2
      - type: grid
        cards:
          - type: heading
            heading: Energy History
          - type: statistics-graph
            title: Energy (24h)
            chart_type: bar
            period: hour
            days_to_show: 1
            stat_types:
              - sum
            entities:
              - sensor.delta_3_max_plus_1753_total_in_energy
              - sensor.delta_3_max_plus_1753_total_out_energy
